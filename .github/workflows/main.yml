name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /home/hojun/Documents/blog
          git pull origin main
      - name: Install dependencies and build
        run: |
          cd /home/hojun/Documents/blog
          npm ci
          npm run build
      - name: Restart app
        run: |
          cd /home/hojun/Documents/blog
          pm2 restart blog || pm2 start build/index.js --name blog
